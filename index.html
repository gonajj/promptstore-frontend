<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090F;--sur:#0D1117;--card:#0D1520;--bdr:#1E2A3A;--bdr2:#243044;
  --acc:#1D6AE5;--acc2:#5B9BF8;--gold:#D97706;--ok:#059669;--er:#DC2626;
  --tx:#EEEEF5;--mu:#6B7A95;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
.syne{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(9,9,15,.92);backdrop-filter:blur(14px);border-bottom:.5px solid var(--bdr);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;background:linear-gradient(135deg,#5B9BF8,#38BDF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.nav-links{display:flex;align-items:center;gap:6px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;border:.5px solid var(--bdr2);font-size:13px;transition:all .15s;font-family:'DM Sans',sans-serif;background:var(--card);color:var(--tx);text-decoration:none}
.btn:hover{background:var(--sur);border-color:var(--acc2)}
.btn-p{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-p:hover{background:#6D28D9;border-color:#6D28D9;box-shadow:0 4px 16px rgba(124,58,237,.4)}
.btn-gold{background:#FEF3C7;color:#92400E;border-color:#FDE68A}
.btn-gold:hover{background:#FDE68A}
.btn-ok{background:#D1FAE5;color:#065F46;border-color:#A7F3D0}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-lg{padding:12px 28px;font-size:15px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* INPUTS */
.inp{width:100%;padding:10px 13px;background:var(--sur);border:.5px solid var(--bdr2);border-radius:8px;color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .18s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--mu)}
textarea.inp{resize:vertical;min-height:90px}
select.inp{cursor:pointer}
.lbl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block}

/* CARDS */
.card{background:var(--card);border:.5px solid var(--bdr);border-radius:12px;overflow:hidden}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.tag{background:var(--sur);border:.5px solid var(--bdr);padding:2px 8px;border-radius:999px;font-size:11px;color:var(--mu)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;background:linear-gradient(135deg,var(--acc),#38BDF8);color:#fff;flex-shrink:0}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;display:none}
.mbg.open{display:flex}
.modal{background:var(--card);border:.5px solid var(--bdr2);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:28px;position:relative}

/* SCREENS */
.screen{display:none}
.screen.active{display:block}

/* GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

/* PILLS */
.cpill{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:999px;border:.5px solid var(--bdr);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;color:var(--mu);background:var(--sur)}
.cpill:hover{border-color:var(--acc)}
.cpill.on{background:var(--acc);color:#fff;border-color:var(--acc)}

/* VOTE BTN */
.vbtn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:7px;background:var(--sur);border:.5px solid var(--bdr2);color:var(--tx);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.vbtn:hover{border-color:var(--acc)}
.vbtn.on{background:#DBEAFE;border-color:var(--acc);color:var(--acc)}

/* TABS */
.tab{padding:9px 16px;border-bottom:2px solid transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--mu);transition:all .15s}
.tab.on{color:var(--acc2);border-bottom-color:var(--acc2)}

/* STAT */
.stat{background:var(--sur);border-radius:10px;padding:14px 16px;border:.5px solid var(--bdr)}

/* NOTIFICATION */
#notif{position:fixed;top:16px;right:16px;background:var(--card);border:.5px solid var(--bdr2);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.3);transform:translateX(120%);transition:transform .3s;max-width:300px}
#notif.show{transform:translateX(0)}
#notif.ok{border-left:3px solid var(--ok)}
#notif.info{border-left:3px solid var(--acc)}
#notif.err{border-left:3px solid var(--er)}

/* LOADING */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ANIMATIONS */
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .25s ease forwards}

/* HERO */
.hero{padding:70px 20px 50px;text-align:center;background:radial-gradient(ellipse 70% 50% at 50% -5%,rgba(29,106,229,.3) 0%,transparent 70%)}
.hero h1{font-size:clamp(32px,6vw,64px);font-weight:800;line-height:1.05;margin-bottom:16px;background:linear-gradient(135deg,#fff 30%,#5B9BF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:16px;color:#9CA3AF;max-width:480px;margin:0 auto 28px;line-height:1.7}

/* PRICING CARDS */
.pcrd{border-radius:14px;padding:24px;border:.5px solid var(--bdr);background:var(--card);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.pcrd:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.3)}
.pcrd.feat{border-color:var(--acc)}
.pcrd.feat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--acc),#38BDF8)}

/* PROGRESS */
.prog{height:4px;background:var(--sur);border-radius:2px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* STRIPE BADGE */
.stripe-pill{background:#635BFF;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:4px}

/* PCARD */
.pcard{display:flex;flex-direction:column;cursor:pointer;transition:box-shadow .15s,transform .15s}
.pcard:hover{box-shadow:0 6px 24px rgba(0,0,0,.25);transform:translateY(-2px)}

/* DIVIDER */
hr.div{border:none;border-top:.5px solid var(--bdr);margin:16px 0}

/* FORM GROUP */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* SECTION */
.section{max-width:1100px;margin:0 auto;padding:24px 18px}

/* BLUR */
.blurred{filter:blur(5px);user-select:none;pointer-events:none}

/* LOCK OVERLAY */
.lock-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(9,9,15,.65);border-radius:8px}
</style>
</head>
<body>

<div id="notif"></div>

<!-- NAV -->
<nav>
  <div class="logo" onclick="goHome()">⚡ PromptStore.pro</div>
  <button id="lang-btn" onclick="toggleLang()" style="background:none;border:.5px solid var(--bdr2);color:var(--mu);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;margin-right:4px">🌐 EN</button>
  <div class="nav-links" id="nav-btns">
    <button class="btn btn-sm" onclick="openModal('login')">Iniciar sesión</button>
    <button class="btn btn-p btn-sm" onclick="openModal('register')">Registrarse</button>
  </div>
</nav>

<!-- ══════ SCREEN: LANDING ══════ -->
<div id="s-landing" class="screen active"><div id="landing-content"></div></div>

<!-- ══════ SCREEN: APP ══════ -->
<div id="s-app" class="screen">
  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div>
        <h1 class="syne" style="font-size:22px;font-weight:800">Explorar prompts</h1>
        <p style="color:var(--mu);font-size:12px" id="prompt-count">Cargando...</p>
      </div>
      <button class="btn btn-p btn-sm" onclick="openModal('upload')">+ Subir prompt</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <input class="inp" id="search-inp" placeholder="🔍  Buscar prompts o tags..." style="flex:1;min-width:180px" oninput="renderPrompts()">
      <select class="inp" id="filter-tier" style="width:150px" onchange="renderPrompts()">
        <option value="all">Todos los niveles</option>
        <option value="free">✓ Gratis</option>
        <option value="medio">🔥 Popular</option>
        <option value="pro">⭐ PRO</option>
      </select>
      <select class="inp" id="sort-sel" style="width:130px" onchange="renderPrompts()">
        <option value="votes">↑ Más votados</option>
        <option value="recent">Recientes</option>
      </select>
    </div>
    <div id="cat-bar" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px"></div>
    <div id="prompt-grid" class="pgrid"></div>
  </div>
</div>

<!-- ══════ SCREEN: DASHBOARD ══════ -->
<div id="s-dashboard" class="screen">
  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div>
        <h1 class="syne" style="font-size:22px;font-weight:800">Dashboard del creador</h1>
        <p style="color:var(--mu);font-size:12px" id="dash-welcome">Cargando...</p>
      </div>
      <button class="btn btn-sm" style="background:#635BFF;color:#fff;border-color:#635BFF" onclick="connectStripeAccount()">
        S Conectar cuenta bancaria
      </button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:20px">
      <div class="stat"><div style="font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Ganancias totales</div><div class="syne" style="font-size:22px;font-weight:800;color:#B45309" id="d-total">$0 MXN</div></div>
      <div class="stat"><div style="font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Mis prompts</div><div class="syne" style="font-size:22px;font-weight:800" id="d-count">0</div></div>
      <div class="stat"><div style="font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Total votos</div><div class="syne" style="font-size:22px;font-weight:800;color:var(--acc2)" id="d-votes">0</div></div>
      <div class="stat"><div style="font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Ventas totales</div><div class="syne" style="font-size:22px;font-weight:800;color:var(--ok)" id="d-sales">0</div></div>
    </div>
    <div id="dash-connect-status" style="margin-bottom:16px"></div>
    <h2 class="syne" style="font-size:16px;font-weight:700;margin-bottom:12px">Mis prompts publicados</h2>
    <div id="dash-prompts" style="display:flex;flex-direction:column;gap:8px"></div>
    <h2 class="syne" style="font-size:16px;font-weight:700;margin-top:24px;margin-bottom:12px">Historial de pagos</h2>
    <div id="payment-history" class="card" style="overflow:auto"></div>
  </div>
</div>

<!-- ══════ MODALS ══════ -->
<div id="modal-bg" class="mbg" onclick="closeModal()">
  <div class="modal fi" onclick="event.stopPropagation()" id="modal-box">
    <button onclick="closeModal()" style="position:absolute;top:12px;right:14px;background:none;border:none;color:var(--mu);cursor:pointer;font-size:17px">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════════════
const API = 'https://promptstore.pro';

const CATS = [
  {id:'marketing',label:'Marketing',icon:'📣',color:'#DC2626'},
  {id:'imagen',label:'Imagen & Arte',icon:'🎨',color:'#1D6AE5'},
  {id:'codigo',label:'Código',icon:'💻',color:'#0284C7'},
  {id:'negocios',label:'Negocios',icon:'💼',color:'#D97706'},
  {id:'escritura',label:'Escritura',icon:'✍️',color:'#059669'},
  {id:'educacion',label:'Educación',icon:'🎓',color:'#2563EB'},
  {id:'productividad',label:'Productividad',icon:'⚡',color:'#DC2626'},
  {id:'redes',label:'Redes Sociales',icon:'📱',color:'#EA580C'},
  {id:'seo',label:'SEO',icon:'🔍',color:'#65A30D'},
  {id:'ventas',label:'Ventas',icon:'💰',color:'#0D9488'},
  {id:'roleplay',label:'Roleplay',icon:'🎭',color:'#DB2777'},
  {id:'otro',label:'Otro',icon:'✨',color:'#1D6AE5'},
];
const AI_TOOLS = ['ChatGPT','Claude','Gemini','Midjourney','DALL-E','Stable Diffusion','Llama','Otro'];

// ── STATE ──
let state = {
  user: null,
  prompts: [
    {id:1,title:'Copywriter Experto para Ventas',category:'marketing',ai:'ChatGPT',author:'Ana García',av:'AG',votes:342,tier:'pro',price:300,preview:'Actúa como copywriter con 10 años en ventas digitales...',full:'Actúa como un copywriter con 10 años de experiencia en ventas digitales. Genera: 1) Headline impactante, 2) Propuesta de valor, 3) Bullets de beneficios, 4) CTA. Producto: [PRODUCTO]',tags:['ventas','copy'],downloads:1240},
    {id:2,title:'Arte Cyberpunk Midjourney',category:'imagen',ai:'Midjourney',author:'Carlos Ruiz',av:'CR',votes:218,tier:'pro',price:300,preview:'Neon-lit cyberpunk cityscape, ultra-detailed, 8k...',full:'A neon-lit cyberpunk cityscape at night, ultra-detailed, 8k resolution, rain-slicked streets reflecting neon signs, flying cars, volumetric fog --ar 16:9 --v 6 --stylize 750',tags:['arte','imagen'],downloads:876},
    {id:3,title:'Senior Dev Code Reviewer',category:'codigo',ai:'Claude',author:'Diego López',av:'DL',votes:189,tier:'medio',price:200,preview:'Eres senior developer. Revisa mi código y busca bugs...',full:'Eres senior developer con 15 años de experiencia. Cuando te comparta código: 1) Bugs y vulnerabilidades, 2) Optimizaciones con ejemplos, 3) Explica cada cambio. Código: [CÓDIGO]',tags:['código','review'],downloads:654},
    {id:4,title:'Plan de Contenido 30 días',category:'redes',ai:'ChatGPT',author:'María Torres',av:'MT',votes:156,tier:'medio',price:200,preview:'Plan editorial 30 días para redes sociales...',full:'Crea plan editorial 30 días para [NICHO] en [RED SOCIAL]. Incluye: tema del día, formato, hook, copy, hashtags y horario óptimo.',tags:['redes','contenido'],downloads:432},
    {id:5,title:'Ideas de Negocio con IA',category:'negocios',ai:'ChatGPT',author:'Roberto Sánchez',av:'RS',votes:89,tier:'free',price:0,preview:'Genera 10 ideas de negocio innovadoras para mi perfil...',full:'Genera 10 ideas de negocio para [PERFIL]. Cada idea: nombre, problema que resuelve, mercado objetivo, modelo de ingresos, inversión inicial, primeros 3 pasos.',tags:['negocio','ideas'],downloads:321},
    {id:6,title:'Editor Profesional de Textos',category:'escritura',ai:'Claude',author:'Laura Jiménez',av:'LJ',votes:67,tier:'free',price:0,preview:'Editor profesional. Corrige sin perder mi voz...',full:'Eres editor con experiencia en medios digitales. Toma mi texto y: 1) Corrige gramática, 2) Mejora claridad, 3) Optimiza para digital. Texto: [TEXTO]',tags:['escritura','edición'],downloads:210},
    {id:7,title:'Estrategia SEO 90 días',category:'seo',ai:'ChatGPT',author:'Javier Mora',av:'JM',votes:134,tier:'medio',price:200,preview:'Auditoría SEO completa y plan de 90 días...',full:'Analiza [URL] y genera estrategia SEO 90 días: keywords, contenido mensual, optimizaciones técnicas y backlinks.',tags:['seo','google'],downloads:567},
    {id:8,title:'Foto de Producto Realista',category:'imagen',ai:'DALL-E',author:'Sofia Reyes',av:'SR',votes:45,tier:'free',price:0,preview:'Professional product photography, clean background...',full:'Professional product photography, [PRODUCT] on clean minimalist background, soft studio lighting, 85mm lens, high resolution commercial quality.',tags:['fotografía','producto'],downloads:189},
  ],
  votes: JSON.parse(localStorage.getItem('ps_votes') || '[]'),
  purchased: JSON.parse(localStorage.getItem('ps_purchased') || '[]'),
  filterCat: 'all',
  payments: JSON.parse(localStorage.getItem('ps_payments') || '[]'),
};

// ── HELPERS ──
const getCat = id => CATS.find(c => c.id === id) || CATS[11];
const getTier = v => {
  if (v > 300) return {tier:'pro',   label:'⭐ PRO',     price:300, color:'#B45309', bg:'#FEF3C7'};
  if (v > 200) return {tier:'medio2',label:'🔥 Popular+',price:200, color:'#1D6AE5', bg:'#DBEAFE'};
  if (v > 100) return {tier:'medio', label:'🔥 Popular', price:100, color:'#991B1B', bg:'#FEE2E2'};
  return              {tier:'free',  label:'✓ Gratis',  price:0,   color:'#065F46', bg:'#D1FAE5'};
};

function notify(msg, type='ok') {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3000);
}

function saveLocal() {
  localStorage.setItem('ps_votes', JSON.stringify(state.votes));
  localStorage.setItem('ps_purchased', JSON.stringify(state.purchased));
  localStorage.setItem('ps_payments', JSON.stringify(state.payments));
  if (state.user) localStorage.setItem('ps_user', JSON.stringify(state.user));
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
  if (id === 'app') { buildCatBar(); renderPrompts(); }
  if (id === 'dashboard') renderDashboard();
  updateNav();
}

function goHome() {
  if (state.user) showScreen('app');
  else showScreen('landing');
}

function updateNav() {
  const nb = document.getElementById('nav-btns');
  if (state.user) {
    nb.innerHTML = `
      <button class="btn btn-sm" onclick="showScreen('app')">${t('nav_explore')}</button>
      <button class="btn btn-sm" onclick="showScreen('dashboard')">${t('nav_dash')}</button>
      <button class="btn btn-p btn-sm" onclick="openModal('upload')">${t('nav_up')}</button>
      <div class="av" style="width:30px;height:30px;cursor:pointer;font-size:11px" onclick="logout()" title="Cerrar sesión">${state.user.name[0].toUpperCase()}</div>`;
  } else {
    nb.innerHTML = `
      <button class="btn btn-sm" onclick="openModal('login')">${t('nav_login')}</button>
      <button class="btn btn-p btn-sm" onclick="openModal('register')">${t('nav_reg')}</button>`;
  }
}


// ── LANDING ──
function buildLanding() {
  document.getElementById('landing-content').innerHTML = `
    <section class="hero">
      <h1 class="syne">Marketplace de Prompts IA</h1>
      <p>Compra, vende y descubre prompts premium para ChatGPT, Claude, Midjourney y más.</p>

      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px">
        <button class="btn btn-p btn-lg" onclick="openModal('register')">
          🚀 Empezar ahora
        </button>
        <button class="btn btn-lg" onclick="showScreen('app')">
          🔍 Explorar prompts
        </button>
      </div>
    </section>

    <section class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:10px;flex-wrap:wrap">
        <div>
          <h2 class="syne" style="font-size:28px;font-weight:800">Explora categorías</h2>
          <p style="color:var(--mu);margin-top:6px">Encuentra prompts para cualquier necesidad</p>
        </div>
      </div>

      <div id="landing-cats" class="pgrid"></div>
    </section>
  `;

  // importante: ahora sí existe el div
  buildLandingCats();
}

// ── LANDING CATS ──
function buildLandingCats() {
  document.getElementById('landing-cats').innerHTML = CATS.map(c => `
    <div class="card" style="padding:14px;text-align:center;cursor:pointer;transition:all .2s;border-color:transparent"
      onmouseenter="this.style.borderColor='${c.color}'" onmouseleave="this.style.borderColor='transparent'"
      onclick="showScreen('app');setFCat('${c.id}')">
      <div style="font-size:24px;margin-bottom:6px">${c.icon}</div>

function setFCat(id) {

// ── RENDER PROMPTS ──
function renderPrompts() {

  let list = [...state.prompts];
  if (q) list = list.filter(p => p.title.toLowerCase().includes(q) || p.tags.join(' ').includes(q));
  if (state.filterCat !== 'all') list = list.filter(p => p.category === state.filterCat);
  if (tier !== 'all') list = list.filter(p => getTier(p.votes).tier === tier);
  list.sort((a, b) => sort === 'votes' ? b.votes - a.votes : b.id - a.id);
  document.getElementById('prompt-count').textContent = list.length + ' prompts disponibles';
  const grid = document.getElementById('prompt-grid');
  if (!list.length) { grid.innerHTML = '<div style="text-align:center;padding:60px;color:var(--mu)"><div style="font-size:32px;margin-bottom:10px">🔍</div><p>Sin resultados</p></div>'; return; }
  grid.innerHTML = list.map(p => {
    const ci = getCat(p.category);
    const ti = getTier(p.votes);
    const voted = state.votes.includes(p.id);
    const paid = ti.tier !== 'free';
    const member = !!state.user;
    return `<div class="card pcard fi" onclick="viewPrompt(${p.id})">
      ${ti.tier==='pro' ? '<div style="height:3px;background:linear-gradient(90deg,#F59E0B,#EF4444)"></div>' : ''}
      ${ti.tier==='medio' ? '<div style="height:3px;background:linear-gradient(90deg,#EF4444,#38BDF8)"></div>' : ''}

        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px">
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <span class="badge" style="background:${ci.color}18;color:${ci.color}">${ci.icon} ${ci.label}</span>
            <span class="badge" style="background:rgba(255,255,255,.05);color:var(--mu)">🤖 ${p.ai}</span>
          </div>
          ${paid ? `<span class="badge" style="background:${ti.bg};color:${ti.color};flex-shrink:0">${ti.label}</span>` : ''}
        </div>
        <div style="font-weight:700;font-size:14px;margin-bottom:6px;line-height:1.3">${p.title}</div>
        <div style="font-size:12px;color:var(--mu);line-height:1.6;margin-bottom:8px;min-height:36px" ${!member && paid ? 'class="blurred"' : ''}>${!member && paid ? 'Contenido premium' : p.preview}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px">${p.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;border-top:.5px solid var(--bdr);padding-top:8px">
          <div style="display:flex;align-items:center;gap:6px">
            <div class="av" style="width:24px;height:24px;font-size:10px">${p.av}</div>
            <span style="font-size:11px;color:var(--mu)">${p.author}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:11px;color:var(--mu)">⬇ ${p.downloads}</span>

// ── VOTE ──
function votePrompt(id) {
  if (!state.user) { openModal('login'); return; }
  const hasVoted = state.votes.includes(id);
  state.votes = hasVoted ? state.votes.filter(x => x !== id) : [...state.votes, id];
  state.prompts = state.prompts.map(p => {
    if (p.id !== id) return p;
    const nv = hasVoted ? p.votes - 1 : p.votes + 1;
    const ti = getTier(nv);
    if (ti.tier !== getTier(p.votes).tier) notify(`¡Prompt subió a nivel ${ti.label}!`, 'info');
    return {...p, votes: nv, tier: ti.tier, price: ti.price};
  });
  saveLocal();
  renderPrompts();
}

      </div>

      </button>
    ` : `<div style="background:#D1FAE5;border-radius:8px;padding:11px;font-size:12px;color:#065F46;text-align:center">✓ Prompt desbloqueado permanentemente</div>`}

// ── BUY PROMPT (conecta con Stripe real) ──
async function buyPromptReal(id) {
  const p = state.prompts.find(x => x.id === id);
  if (!p || !state.user) return;
  const btn = document.getElementById('buy-btn-' + id);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Procesando...'; }
  try {
    const res = await fetch(`${API}/prompt/buy`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        promptId: id,
        buyerEmail: state.user.email,
        promptTitle: p.title,
        price: p.price,
        authorStripeAccountId: null,
      }),
    });
    const data = await res.json();
    if (data.url) {
      // Guardar que compró para cuando regrese
      state.purchased.push(id);
      saveLocal();
      window.location.href = data.url;
    } else {
      throw new Error(data.error || 'Error al crear sesión de pago');
    }
  } catch (err) {
    notify('Error: ' + err.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = `Desbloquear por $${p.price} MXN →`; }
  }
}

function copyPrompt(id) {
  const p = state.prompts.find(x => x.id === id);
  navigator.clipboard?.writeText(p.full);
  notify('Prompt copiado al portapapeles ✓', 'ok');
}

// ── LOGIN ──
function doLogin() {
  const email = document.getElementById('l-email')?.value;
  const pass = document.getElementById('l-pass')?.value;
  if (!email || !pass) { notify('Completa todos los campos', 'err'); return; }
  const name = email.split('@')[0];
  state.user = {name, email, member: true};
  saveLocal();
  closeModal();
  showScreen('app');
  notify('¡Bienvenido de vuelta, ' + name + '!', 'ok');
  updateNav();
}

// ── REGISTER (conecta con Stripe real) ──
async function doRegister() {
  const name = document.getElementById('r-name')?.value;
  const email = document.getElementById('r-email')?.value;
  if (!name || !email) { notify('Completa todos los campos', 'err'); return; }
  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Conectando con Stripe...';
  try {
    const res = await fetch(`${API}/membership/checkout`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, email}),
    });
    const data = await res.json();
    if (data.url) {
      // Guardar usuario pre-registro
      state.user = {name, email, member: false};
      saveLocal();
      window.location.href = data.url;
    } else {
      throw new Error(data.error || 'Error al crear sesión');
    }
  } catch (err) {
    notify('Error: ' + err.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Pagar $100 MXN y crear cuenta →';
  }
}

// ── UPLOAD ──
function doUpload() {
  const title = document.getElementById('u-title')?.value;
  const cat = document.getElementById('u-cat')?.value;
  const ai = document.getElementById('u-ai')?.value;
  const full = document.getElementById('u-full')?.value;

  const preview = document.getElementById('u-preview')?.value || full.slice(0, 70) + '...';
  const tags = (document.getElementById('u-tags')?.value || '').split(',').map(t => t.trim()).filter(Boolean);
  const initials = (state.user?.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  state.prompts = [{
    id: Date.now(), title, category: cat, ai,
    author: state.user?.name || 'Usuario', av: initials,
    votes: 0, tier: 'free', price: 0,
    preview, full, tags, downloads: 0
  }, ...state.prompts];
  closeModal();
  renderPrompts();
  notify('Prompt publicado con éxito ✓', 'ok');
}

function checkSuccess() {
  const params = new URLSearchParams(window.location.search);
  const type = params.get('type');
  const connectStatus = params.get('connect');

  if (type === 'membership') {
    const saved = localStorage.getItem('ps_user');
    if (saved) {
      state.user = JSON.parse(saved);
      state.user.member = true;
      saveLocal();
    }
    notify('✓ Membresía activada. ¡Bienvenido a PromptStore.pro!', 'ok');
    window.history.replaceState({}, '', '/');
    showScreen('app');
    updateNav();
  }

  if (type === 'prompt') {
    const promptId = parseInt(params.get('promptId'));
    if (promptId && !state.purchased.includes(promptId)) {
      state.purchased.push(promptId);
      const p = state.prompts.find(x => x.id === promptId);
      if (p) {
        state.payments.push({
          promptTitle: p.title,
          amount: p.price,
          authorEarning: Math.round(p.price * .7),
          date: new Date().toLocaleDateString('es-MX'),
        });
      }
      saveLocal();
    }
    notify('✓ Prompt desbloqueado permanentemente', 'ok');
    window.history.replaceState({}, '', '/');
    showScreen('app');
    updateNav();
  }

  if (connectStatus === 'success') {
    notify('✓ Cuenta bancaria conectada via Stripe', 'ok');
    window.history.replaceState({}, '', '/');
    showScreen('dashboard');
  }
}

function t(k){
  return I18N[lang]?.[k] || k;
}

function toggleLang(){
  lang = lang === 'es' ? 'en' : 'es';
  localStorage.setItem('ps_lang', lang);

  const btn = document.getElementById('lang-btn');
  if(btn){
    btn.textContent = lang === 'es' ? '🌐 EN' : '🌐 ES';
  }

  updateNav();

  if(state.user){
    renderPrompts();
    renderDashboard();
  }
}


// ── INIT ──
function init() {
  buildLanding();

  buildCatBar();

  const btn = document.getElementById('lang-btn');
  if(btn){
    btn.textContent = lang === 'es' ? '🌐 EN' : '🌐 ES';
  }

  // Restaurar sesión
  const saved = localStorage.getItem('ps_user');
  if (saved) {
    state.user = JSON.parse(saved);
    updateNav();
  }

  // Verificar si viene de Stripe
  if (window.location.search.includes('type=') || window.location.search.includes('connect=')) {
    checkSuccess();
  } else if (state.user) {
    showScreen('app');
  }
}

init();
